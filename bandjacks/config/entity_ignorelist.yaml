# File extensions that are not entities
file_extensions:
  - ".ps1"
  - ".js"
  - ".exe"
  - ".dll"
  - ".bat"
  - ".cmd"
  - ".vbs"
  - ".wsf"
  - ".7z"
  - ".zip"
  - ".rar"
  - ".tar"
  - ".txt"
  - ".doc"
  - ".pdf"

# Generic terms that are too broad to be entities
generic_terms:
  - "script"
  - "file"
  - "command"
  - "expression"
  - "payload"
  - "sample"
  - "archive"
  - "download"
  - "document"
  - "object"
  - "process"
  - "system"
  - "application"
  - "program"
  - "software"

# Code constructs and functions that aren't entities
code_constructs:
  - "Convert.FromBase64String"
  - "ActiveXObject"
  - "Invoke-Expression"
  - "Start-Process"
  - "WScript.Shell"
  - "Scripting.FileSystemObject"
  - "MSXML2.XMLHTTP"
  - "ActiveXObject('MSXML2.XMLHTTP')"
  - "ActiveXObject('Scripting.FileSystemObject')"
  - "ActiveXObject('WScript.Shell')"
  - "Convert.FromBase64String"
  - "System.Reflection.Assembly"
  - "System.Text.Encoding"

# Regex patterns to match non-entities
patterns:
  - "^PS1 .*"           # PS1 file, PS1 script, etc.
  - "^JS .*"            # JS file, JS script, etc.
  - "^7Z .*"            # 7Z archive, etc.
  - "^WSF .*"           # WSF file, WSF downloader, etc.
  - "^VB6 .*"           # VB6 payload, etc.
  - ".*Object\\(.*\\)$"  # ActiveXObject(...) patterns
  - "^proxy call .*"    # proxy call remover, etc.
  - "^.* expression$"   # PowerShell expression, etc.
  - "^.* command$"      # PowerShell command, etc.
  - "^.* files?$"       # PS1 files, JS file, etc.